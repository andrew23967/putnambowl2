{% extends 'base.html' %}
{% block title %}Report Bug — PutnamBowl{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto">
  <div class="mb-6">
    <h1 class="text-xl font-bold text-slate-900">Report a Bug</h1>
    <p class="text-slate-500 text-sm">Something broken? Let us know.</p>
  </div>
  <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
    <form method="post" class="space-y-4">
      {% csrf_token %}
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Describe the bug</label>
        <textarea name="description" rows="6" placeholder="What happened? What did you expect?" class="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 ring-theme resize-none"></textarea>
      </div>
      <button type="submit" class="w-full py-2.5 text-sm font-semibold btn-theme rounded-xl">Submit Report</button>
    </form>
  </div>
</div>
{% endblock %}
